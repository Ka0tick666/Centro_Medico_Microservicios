server:
  port: 8081

spring:
  application:
    name: ms-paciente
  datasource:
    # Si detecta AWS usa DB_HOST, si no, vuelve a tu localhost:3306/paciente_db local
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:paciente_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}   # Asegúrate de que esta sea tu clave de MySQL local
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop # 👈 ¡Excelente! Esto te va a vaciar las tablas al iniciar para probar limpio
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# 👇 SECCIÓN EUREKA 👇
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance: # 👈 Va alineado con "client"
    prefer-ip-address: true
    hostname: localhost
    status-page-url-path: /