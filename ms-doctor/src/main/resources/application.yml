server:
  port: 8082

spring:
  application:
    name: ms-doctor
  
  datasource:
    # Híbrido: Si detecta AWS usa DB_HOST, si no, vuelve a tu localhost:3306/db_doctores local
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:db_doctores}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}  # <-- Tu clave de MySQL aquí
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance: # 👈 Va alineado con "client"
    prefer-ip-address: true
    hostname: localhost
    status-page-url-path: /