server:
  port: 8083

spring:
  application:
    name: ms-cita
  
  datasource:
    url: jdbc:mysql://localhost:3306/db_citas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root  # <-- Tu clave de MySQL aquí si tienes
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost  # 👈 AGREGA ESTA LÍNEA AQUÍ
    status-page-url-path: /
